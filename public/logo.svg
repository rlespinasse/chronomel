<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="ChronoMEL">
  <title>ChronoMEL</title>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1b6fd6"/>
      <stop offset="1" stop-color="#0b3a78"/>
    </linearGradient>
    <clipPath id="badge">
      <rect x="4" y="4" width="56" height="56" rx="13"/>
    </clipPath>
  </defs>

  <!-- Badge -->
  <rect x="4" y="4" width="56" height="56" rx="13" fill="url(#sky)"/>

  <!-- Mosaïque aérienne : parcelles « passé » (ambre) à gauche, « présent » (vert) à droite -->
  <g clip-path="url(#badge)">
    <g opacity="0.95">
      <!-- Gauche : sépia / passé -->
      <rect x="5"  y="7"  width="11" height="10" rx="2" fill="#e9c178"/>
      <rect x="18" y="7"  width="9"  height="7"  rx="2" fill="#d39a3c"/>
      <rect x="5"  y="19" width="8"  height="13" rx="2" fill="#b87a26"/>
      <rect x="15" y="17" width="12" height="9"  rx="2" fill="#d9a441"/>
      <rect x="5"  y="34" width="12" height="8"  rx="2" fill="#e9c178"/>
      <rect x="19" y="29" width="8"  height="13" rx="2" fill="#b87a26"/>
      <rect x="6"  y="44" width="10" height="13" rx="2" fill="#d39a3c"/>
      <rect x="19" y="44" width="8"  height="13" rx="2" fill="#e9c178"/>
      <!-- Droite : vert / présent -->
      <rect x="37" y="7"  width="9"  height="7"  rx="2" fill="#86d6a4"/>
      <rect x="48" y="7"  width="11" height="10" rx="2" fill="#3fa96b"/>
      <rect x="37" y="17" width="12" height="9"  rx="2" fill="#2e7d54"/>
      <rect x="51" y="19" width="8"  height="13" rx="2" fill="#27734c"/>
      <rect x="37" y="29" width="8"  height="13" rx="2" fill="#3fa96b"/>
      <rect x="47" y="34" width="12" height="8"  rx="2" fill="#86d6a4"/>
      <rect x="37" y="44" width="8"  height="13" rx="2" fill="#2e7d54"/>
      <rect x="48" y="44" width="11" height="13" rx="2" fill="#3fa96b"/>
    </g>

    <!-- Séparateur du comparateur (le rideau), interrompu par l'horloge -->
    <line x1="32" y1="4"  x2="32" y2="20" stroke="#ffffff" stroke-width="2.4" stroke-linecap="round"/>
    <line x1="32" y1="44" x2="32" y2="60" stroke="#ffffff" stroke-width="2.4" stroke-linecap="round"/>
  </g>

  <!-- Horloge centrale = chrono + poignée du curseur -->
  <circle cx="32" cy="32" r="12" fill="#ffffff"/>
  <g fill="#0b3a78">
    <circle cx="32" cy="22.5" r="1.1"/>
    <circle cx="41.5" cy="32" r="1.1"/>
    <circle cx="32" cy="41.5" r="1.1"/>
    <circle cx="22.5" cy="32" r="1.1"/>
  </g>
  <g stroke="#0b3a78" stroke-width="2.2" stroke-linecap="round">
    <line x1="32" y1="32" x2="32" y2="25"/>
    <line x1="32" y1="32" x2="37" y2="34.5"/>
  </g>
  <circle cx="32" cy="32" r="1.8" fill="#0b3a78"/>
</svg>
