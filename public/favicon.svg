<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="ChronoMEL">
  <title>ChronoMEL</title>
  <defs>
    <clipPath id="b">
      <rect x="3" y="3" width="58" height="58" rx="14"/>
    </clipPath>
  </defs>
  <g clip-path="url(#b)">
    <!-- Deux moitiés : passé (ambre) / présent (vert) -->
    <rect x="3" y="3" width="29" height="58" fill="#d39a3c"/>
    <rect x="32" y="3" width="29" height="58" fill="#2e7d54"/>
    <!-- Séparateur du comparateur, interrompu par l'horloge -->
    <line x1="32" y1="3"  x2="32" y2="18" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
    <line x1="32" y1="46" x2="32" y2="61" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
  </g>
  <!-- Horloge centrale -->
  <circle cx="32" cy="32" r="15" fill="#ffffff"/>
  <g stroke="#0b3a78" stroke-width="3" stroke-linecap="round">
    <line x1="32" y1="32" x2="32" y2="23"/>
    <line x1="32" y1="32" x2="38" y2="35"/>
  </g>
  <circle cx="32" cy="32" r="2.4" fill="#0b3a78"/>
</svg>
