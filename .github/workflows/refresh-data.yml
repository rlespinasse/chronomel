name: Mise à jour des données

on:
  schedule:
    # Le 1er de chaque mois à 06:00 UTC
    - cron: '0 6 1 * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Récupération du dépôt
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Installation de Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: npm

      - name: Installation des dépendances
        run: npm ci

      - name: Téléchargement du GeoJSON des communes
        run: npm run refresh-data

      - name: Téléchargement du bâti remarquable (BD TOPO)
        run: npm run refresh-bati

      - name: Téléchargement des calques de contexte (BD TOPO)
        run: |
          npm run refresh-transport
          npm run refresh-hydro
          npm run refresh-vegetation
          npm run refresh-equipements

      - name: Ouverture d'une pull request si changement
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          commit-message: 'chore(data): mise à jour des données MEL'
          title: 'chore(data): mise à jour des données MEL'
          body: |
            Mise à jour automatique des données :
            - contour des communes (API OGC Features de la MEL) ;
            - bâti remarquable daté (BD TOPO® © IGN, via la Géoplateforme) ;
            - calques de contexte : réseau ferré, hydrographie, espaces verts,
              équipements structurants (BD TOPO® © IGN, via la Géoplateforme).
          branch: data/refresh
          delete-branch: true
          add-paths: |
            public/data/communes-mel.geojson
            public/data/bati-remarquable.geojson
            public/data/transport.geojson
            public/data/hydro-cours.geojson
            public/data/hydro-surfaces.geojson
            public/data/vegetation.geojson
            public/data/equipements.geojson
